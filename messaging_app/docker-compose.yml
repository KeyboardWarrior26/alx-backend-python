services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: alxuser
      MYSQL_PASSWORD: alxpass
      MYSQL_DB: messaging  # <-- Fix here: MYSQL_DB instead of MYSQL_DATABASE
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: web
    restart: always
    command: python3 manage.py runserver 0.0.0.0:8000  # <-- Fix here
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db_data:

